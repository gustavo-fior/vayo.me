<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAYØ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Loading -->
  <div id="screen-loading" class="screen">
    <div class="spinner"></div>
  </div>

  <!-- Auth -->
  <div id="screen-auth" class="screen hidden">
    <div class="auth-container">
      <h2>VAYØ</h2>
      <p class="text-muted" style="margin-bottom: 0.5rem;">Sign in to save bookmarks and assets.</p>
      <button id="btn-signin" class="btn-primary">Sign in to VAYØ</button>
    </div>
  </div>

  <!-- Bookmark mode -->
  <div id="screen-bookmark" class="screen hidden">
    <div class="page-info">
      <img id="bookmark-favicon" class="favicon" src="" alt="">
      <div class="page-meta">
        <div id="bookmark-title" class="page-title"></div>
        <div id="bookmark-url" class="page-url"></div>
      </div>
    </div>
    <div class="field">
      <label for="bookmark-folder">Folder</label>
      <div class="select-row">
        <select id="bookmark-folder"></select>
        <button id="btn-new-bookmark-folder" class="btn-new-folder" type="button" aria-label="New folder">+</button>
      </div>
      <div id="new-bookmark-folder-form" class="new-folder-form hidden">
        <div class="new-folder-type-row">
          <button type="button" class="type-toggle active" data-type="bookmarks" data-form="bookmark">Bookmarks</button>
          <button type="button" class="type-toggle" data-type="canvas" data-form="bookmark">Canvas</button>
        </div>
        <div class="new-folder-name-row">
          <button id="btn-emoji-bookmark" class="btn-emoji" type="button">?</button>
          <input id="new-bookmark-folder-name" type="text" class="new-folder-input" placeholder="Folder name" maxlength="50">
        </div>
        <div id="emoji-grid-bookmark" class="emoji-grid hidden"></div>
        <div class="new-folder-actions">
          <button id="btn-cancel-bookmark-folder" class="btn-new-folder-cancel" type="button">Cancel</button>
          <button id="btn-create-bookmark-folder" class="btn-new-folder-create" type="button">Create</button>
        </div>
      </div>
    </div>
    <button id="btn-save-bookmark" class="btn-primary">Save</button>
  </div>

  <!-- Asset mode -->
  <div id="screen-asset" class="screen hidden">
    <div class="asset-preview">
      <button id="btn-remove-asset" class="asset-remove-btn" type="button" aria-label="Remove asset">
        ×
      </button>
      <img id="asset-preview-img" class="preview-img hidden" src="" alt="Preview">
      <video id="asset-preview-video" class="preview-video hidden" src="" muted autoplay loop></video>
    </div>
    <div class="field">
      <label for="asset-folder">Canvas Folder</label>
      <div class="select-row">
        <select id="asset-folder"></select>
        <button id="btn-new-asset-folder" class="btn-new-folder" type="button" aria-label="New folder">+</button>
      </div>
      <div id="new-asset-folder-form" class="new-folder-form hidden">
        <div class="new-folder-type-row">
          <button type="button" class="type-toggle" data-type="bookmarks" data-form="asset">Bookmarks</button>
          <button type="button" class="type-toggle active" data-type="canvas" data-form="asset">Canvas</button>
        </div>
        <div class="new-folder-name-row">
          <button id="btn-emoji-asset" class="btn-emoji" type="button">?</button>
          <input id="new-asset-folder-name" type="text" class="new-folder-input" placeholder="Folder name" maxlength="50">
        </div>
        <div id="emoji-grid-asset" class="emoji-grid hidden"></div>
        <div class="new-folder-actions">
          <button id="btn-cancel-asset-folder" class="btn-new-folder-cancel" type="button">Cancel</button>
          <button id="btn-create-asset-folder" class="btn-new-folder-create" type="button">Create</button>
        </div>
      </div>
    </div>
    <button id="btn-save-asset" class="btn-primary">Save</button>
  </div>

  <!-- Tweet assets mode -->
  <div id="screen-tweet-assets" class="screen hidden">
    <p id="tweet-assets-count" class="text-muted"></p>
    <div id="tweet-assets-grid" class="tweet-assets-grid"></div>
    <div class="field">
      <label for="tweet-assets-folder">Canvas Folder</label>
      <div class="select-row">
        <select id="tweet-assets-folder"></select>
        <button id="btn-new-tweet-folder" class="btn-new-folder" type="button" aria-label="New folder">+</button>
      </div>
      <div id="new-tweet-folder-form" class="new-folder-form hidden">
        <div class="new-folder-type-row">
          <button type="button" class="type-toggle" data-type="bookmarks" data-form="tweet">Bookmarks</button>
          <button type="button" class="type-toggle active" data-type="canvas" data-form="tweet">Canvas</button>
        </div>
        <div class="new-folder-name-row">
          <button id="btn-emoji-tweet" class="btn-emoji" type="button">?</button>
          <input id="new-tweet-folder-name" type="text" class="new-folder-input" placeholder="Folder name" maxlength="50">
        </div>
        <div id="emoji-grid-tweet" class="emoji-grid hidden"></div>
        <div class="new-folder-actions">
          <button id="btn-cancel-tweet-folder" class="btn-new-folder-cancel" type="button">Cancel</button>
          <button id="btn-create-tweet-folder" class="btn-new-folder-create" type="button">Create</button>
        </div>
      </div>
    </div>
    <button id="btn-save-tweet-assets" class="btn-primary">Save All</button>
    <div class="progress-bar hidden" id="tweet-assets-progress-bar">
      <div class="progress-fill" id="tweet-assets-progress-fill"></div>
    </div>
    <p class="progress-text hidden" id="tweet-assets-progress-text"></p>
  </div>

  <!-- Success -->
  <div id="screen-success" class="screen hidden">
    <div class="success-container">
      <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      <p>Saved!</p>
    </div>
  </div>

  <!-- Error -->
  <div id="screen-error" class="screen hidden">
    <div class="error-container">
      <p id="error-message" class="text-destructive"></p>
      <button id="btn-retry" class="btn-secondary">Retry</button>
    </div>
  </div>

  <script src="../../dist/popup/popup.js" type="module"></script>
</body>
</html>
